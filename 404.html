<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 - Page Not Found | SST Public School Rashidabad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/animations.css"/>
  <style>
    .error-page { min-height:100vh; background:linear-gradient(135deg,#0a1628 0%,#1e3a5f 60%,#0f2340 100%); display:flex; align-items:center; justify-content:center; text-align:center; position:relative; overflow:hidden; }
    .error-page::before { content:'404'; position:absolute; font-size:25vw; font-weight:900; color:rgba(200,169,81,0.04); font-family:var(--font-serif); top:50%; left:50%; transform:translate(-50%,-50%); line-height:1; pointer-events:none; }
    .error-content { position:relative; z-index:2; padding:40px 24px; }
    .error-icon { font-size:6rem; color:rgba(200,169,81,0.6); margin-bottom:24px; animation:bounce-soft 3s ease-in-out infinite; }
    .error-code { font-family:var(--font-serif); font-size:clamp(5rem,15vw,10rem); font-weight:900; color:var(--accent); line-height:1; margin-bottom:0; }
    .error-title { font-size:clamp(1.5rem,4vw,2.5rem); color:var(--white); margin-bottom:16px; }
    .error-desc { color:rgba(255,255,255,0.65); font-size:1.05rem; max-width:480px; margin:0 auto 36px; line-height:1.8; }
    .error-links { display:flex; flex-wrap:wrap; gap:14px; justify-content:center; }
    .error-links a { padding:12px 28px; border-radius:var(--radius-full); font-size:0.9rem; font-weight:600; transition:all var(--transition); display:flex; align-items:center; gap:8px; }
    .error-links a.primary { background:var(--accent); color:var(--primary); box-shadow:var(--shadow-gold); }
    .error-links a.primary:hover { background:var(--accent-light); transform:translateY(-2px); }
    .error-links a.secondary { border:2px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.85); }
    .error-links a.secondary:hover { border-color:var(--accent); color:var(--accent); }
    .quick-pages { margin-top:56px; }
    .quick-pages h4 { color:rgba(255,255,255,0.5); font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:20px; }
    .quick-links-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
    .quick-link-item { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.75); padding:10px 18px; border-radius:var(--radius-full); font-size:0.82rem; transition:all var(--transition); display:flex; align-items:center; gap:8px; }
    .quick-link-item:hover { background:rgba(200,169,81,0.15); border-color:var(--accent); color:var(--accent-light); }
    .quick-link-item i { color:var(--accent); font-size:0.75rem; }
  </style>
</head>
<body style="overflow-x:hidden;">
<div class="error-page">
  <div class="error-content">
    <div class="error-icon"><i class="fas fa-map-marked-alt"></i></div>
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">Oops! The page you are looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <div class="error-links">
      <a href="index.html" class="primary"><i class="fas fa-home"></i> Go to Homepage</a>
      <a href="contact.html" class="secondary"><i class="fas fa-envelope"></i> Contact Us</a>
    </div>
    <div class="quick-pages">
      <h4>Quick Navigation</h4>
      <div class="quick-links-grid">
        <a href="about-us.html" class="quick-link-item"><i class="fas fa-school"></i> About Us</a>
        <a href="how-to-apply.html" class="quick-link-item"><i class="fas fa-graduation-cap"></i> Admissions</a>
        <a href="faculty.html" class="quick-link-item"><i class="fas fa-users"></i> Faculty</a>
        <a href="news.html" class="quick-link-item"><i class="fas fa-newspaper"></i> News</a>
        <a href="gallery.html" class="quick-link-item"><i class="fas fa-images"></i> Gallery</a>
        <a href="downloads.html" class="quick-link-item"><i class="fas fa-download"></i> Downloads</a>
        <a href="fee-structure.html" class="quick-link-item"><i class="fas fa-money-bill"></i> Fees</a>
        <a href="contact.html" class="quick-link-item"><i class="fas fa-phone"></i> Contact</a>
      </div>
    </div>
  </div>
</div>
<script src="js/navbar.js"></script><script src="js/main.js"></script>
<script>setTimeout(()=>{ if(document.referrer===''){ /* auto-redirect countdown if needed */ } }, 10000);</script>
</body>
</html>
